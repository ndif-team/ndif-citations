<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="background:transparent">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .phase-label { font-size: 15px; font-weight: 700; fill: #2C2C2A; }
  .phase-sub { font-size: 12px; font-weight: 400; fill: #888780; }
  /* Blue ramp */
  .b-fill { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .b-title { fill: #0C447C; font-size: 13px; font-weight: 600; }
  .b-sub { fill: #185FA5; font-size: 11px; }
  /* Teal ramp */
  .t-fill { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .t-title { fill: #085041; font-size: 13px; font-weight: 600; }
  .t-sub { fill: #0F6E56; font-size: 11px; }
  /* Coral ramp */
  .co-fill { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .co-title { fill: #712B13; font-size: 13px; font-weight: 600; }
  /* Purple ramp */
  .p-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .p-title { fill: #3C3489; font-size: 13px; font-weight: 600; }
  .p-sub { fill: #534AB7; font-size: 11px; }
  /* Amber ramp */
  .a-fill { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .a-title { fill: #633806; font-size: 13px; font-weight: 600; }
  .a-sub { fill: #854F0B; font-size: 11px; }
  /* Gray ramp */
  .g-fill { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .g-title { fill: #444441; font-size: 13px; font-weight: 600; }
  .g-sub { fill: #5F5E5A; font-size: 11px; }
  /* Green ramp */
  .gr-fill { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 0.5; }
  .gr-title { fill: #27500A; font-size: 13px; font-weight: 600; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase 1 -->
<text class="phase-label" x="40" y="30">Phase 1: Discovery</text>
<text class="phase-sub" x="40" y="48">Query three APIs, collect raw citations</text>

<rect class="b-fill" x="40" y="64" width="170" height="56" rx="8"/>
<text class="b-title" x="125" y="86" text-anchor="middle">Semantic Scholar</text>
<text class="b-sub" x="125" y="104" text-anchor="middle">Citation graph</text>

<rect class="b-fill" x="255" y="64" width="170" height="56" rx="8"/>
<text class="b-title" x="340" y="86" text-anchor="middle">OpenAlex</text>
<text class="b-sub" x="340" y="104" text-anchor="middle">Fulltext search</text>

<rect class="b-fill" x="470" y="64" width="170" height="56" rx="8"/>
<text class="b-title" x="555" y="86" text-anchor="middle">GitHub dependents</text>
<text class="b-sub" x="555" y="104" text-anchor="middle">README scraping</text>

<line x1="125" y1="120" x2="125" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="120" x2="340" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="555" y1="120" x2="555" y2="150" class="arr" marker-end="url(#arrow)"/>

<rect class="g-fill" x="40" y="150" width="600" height="44" rx="8"/>
<text class="g-title" x="340" y="176" text-anchor="middle">Deduplication (arXiv ID, DOI, title similarity via rapidfuzz)</text>

<line x1="340" y1="194" x2="340" y2="234" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 2 -->
<text class="phase-label" x="40" y="254">Phase 2: Metadata enrichment</text>
<text class="phase-sub" x="40" y="272">Format venues, detect peer review, generate BibTeX</text>

<rect class="t-fill" x="40" y="288" width="135" height="50" rx="8"/>
<text class="t-title" x="108" y="308" text-anchor="middle">Venue format</text>
<text class="t-sub" x="108" y="324" text-anchor="middle">ICLR 2025, ArXiv</text>

<line x1="175" y1="313" x2="195" y2="313" class="arr" marker-end="url(#arrow)"/>

<rect class="t-fill" x="195" y="288" width="125" height="50" rx="8"/>
<text class="t-title" x="258" y="308" text-anchor="middle">Peer review</text>
<text class="t-sub" x="258" y="324" text-anchor="middle">Venue lookup</text>

<line x1="320" y1="313" x2="340" y2="313" class="arr" marker-end="url(#arrow)"/>

<rect class="t-fill" x="340" y="288" width="125" height="50" rx="8"/>
<text class="t-title" x="403" y="308" text-anchor="middle">BibTeX gen</text>
<text class="t-sub" x="403" y="324" text-anchor="middle">Auto-generated</text>

<line x1="465" y1="313" x2="485" y2="313" class="arr" marker-end="url(#arrow)"/>

<rect class="t-fill" x="485" y="288" width="155" height="50" rx="8"/>
<text class="t-title" x="563" y="308" text-anchor="middle">Affiliations</text>
<text class="t-sub" x="563" y="324" text-anchor="middle">OpenAlex enrichment</text>

<line x1="340" y1="338" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 3 -->
<text class="phase-label" x="40" y="408">Phase 3: Content processing</text>
<text class="phase-sub" x="40" y="426">Download PDF once, extract context + thumbnail, classify via LLM</text>

<rect class="co-fill" x="40" y="446" width="160" height="44" rx="8"/>
<text class="co-title" x="120" y="472" text-anchor="middle">Download PDF</text>

<line x1="200" y1="468" x2="230" y2="468" class="arr"/>
<path d="M230 468 L230 508 L268 508" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M230 468 L230 580 L268 580" fill="none" class="arr" marker-end="url(#arrow)"/>

<rect class="co-fill" x="268" y="486" width="170" height="44" rx="8"/>
<text class="co-title" x="353" y="512" text-anchor="middle">Extract NDIF context</text>

<rect class="co-fill" x="268" y="558" width="170" height="44" rx="8"/>
<text class="co-title" x="353" y="584" text-anchor="middle">Extract thumbnail</text>

<line x1="438" y1="508" x2="460" y2="508" class="arr"/>
<path d="M460 508 L460 474 L480 474" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M460 508 L460 546 L480 546" fill="none" class="arr" marker-end="url(#arrow)"/>

<rect class="p-fill" x="480" y="450" width="160" height="50" rx="8"/>
<text class="p-title" x="560" y="470" text-anchor="middle">LLM summary</text>
<text class="p-sub" x="560" y="486" text-anchor="middle">1-3 sentence desc</text>

<rect class="p-fill" x="480" y="520" width="160" height="50" rx="8"/>
<text class="p-title" x="560" y="540" text-anchor="middle">LLM classify</text>
<text class="p-sub" x="560" y="556" text-anchor="middle">3-way category</text>

<text class="t-sub" x="448" y="596">/images/*.png</text>

<line x1="340" y1="610" x2="340" y2="660" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 4 -->
<text class="phase-label" x="40" y="680">Phase 4: Merge and output</text>
<text class="phase-sub" x="40" y="698">Append to existing data, detect venue upgrades, write all formats</text>

<rect class="g-fill" x="40" y="714" width="240" height="50" rx="8"/>
<text class="g-title" x="160" y="734" text-anchor="middle">Merge with existing</text>
<text class="g-sub" x="160" y="750" text-anchor="middle">Preserve manual edits</text>

<line x1="280" y1="739" x2="310" y2="739" class="arr" marker-end="url(#arrow)"/>

<rect class="gr-fill" x="310" y="714" width="160" height="50" rx="8"/>
<text class="gr-title" x="390" y="744" text-anchor="middle">Venue upgrades</text>

<line x1="470" y1="739" x2="500" y2="739" class="arr" marker-end="url(#arrow)"/>

<rect class="g-fill" x="500" y="714" width="140" height="50" rx="8"/>
<text class="g-title" x="570" y="744" text-anchor="middle">CLI report</text>

<line x1="340" y1="764" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>

<!-- Output files -->
<rect class="a-fill" x="40" y="800" width="185" height="44" rx="8"/>
<text class="a-title" x="133" y="826" text-anchor="middle">research-papers.json</text>

<rect class="a-fill" x="248" y="800" width="200" height="44" rx="8"/>
<text class="a-title" x="348" y="826" text-anchor="middle">research-papers-full.json</text>

<rect class="a-fill" x="470" y="800" width="170" height="44" rx="8"/>
<text class="a-title" x="555" y="826" text-anchor="middle">research-papers.csv</text>

<text class="a-sub" x="133" y="862" text-anchor="middle">Website-ready</text>
<text class="a-sub" x="348" y="862" text-anchor="middle">Full metadata (merge state)</text>
<text class="a-sub" x="555" y="862" text-anchor="middle">Grant reporting</text>

<text class="phase-sub" x="340" y="900" text-anchor="middle">Blue = discovery | Teal = enrichment | Coral + Purple = processing | Amber = outputs</text>
</svg>